name: Deploy to Hetzner

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 89.167.83.224
          username: root
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            cd /var/www/kore-agent
            git pull origin main
            systemctl restart kore
            systemctl restart kore-telegram
            curl -s -X POST "https://api.telegram.org/bot8540573483:AAHnPkPT0a4DE4NgtmUXmDuatZVL7isCPJ4/sendMessage" \
              -d chat_id=1087337645 \
              -d text="✅ KORE deployed!"
